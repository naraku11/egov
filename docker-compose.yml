version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: egov_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-egov_root_secret}
      MYSQL_USER: ${MYSQL_USER:-egov}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-egov_secret}
      MYSQL_DATABASE: ${MYSQL_DB:-egov_aluguinsan}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - egov_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-egov_root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: egov_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - egov_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: egov_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-egov}:${MYSQL_PASSWORD:-egov_secret}@mysql:3306/${MYSQL_DB:-egov_aluguinsan}
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_changeinprod}
      NODE_ENV: production
      PORT: 5000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads
    networks:
      - egov_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: egov_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - egov_network

volumes:
  mysql_data:
  uploads_data:

networks:
  egov_network:
    driver: bridge
